<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新規スレッド作成 | AnonBoard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Noto Sans JP to match the main board -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb", // blue-600
                        "primary-hover": "#3b82f6", // blue-500
                        "background-dark": "#0f1115",
                        "surface-dark": "#161920",
                        "border-dark": "#1e293b", // slate-800
                    },
                    fontFamily: {
                        "sans": ["Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0f1115;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-dark text-slate-200 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-800 bg-[#161920]/80 backdrop-blur-md px-6 py-4 lg:px-40 sticky top-0 z-20">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-600/20">
<span class="material-symbols-outlined">edit_square</span>
</div>
<div class="flex flex-col">
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">新規スレッド作成</h2>
<p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">テクノロジー板</p>
</div>
</div>
<div class="flex gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-xl h-10 px-6 bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors text-sm font-bold">
<span>キャンセル</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-xl h-10 px-6 bg-blue-600 text-white hover:bg-blue-500 transition-colors text-sm font-bold shadow-lg shadow-blue-600/20">
<span>投稿する</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center py-8 px-4 overflow-y-auto custom-scrollbar">
<div class="w-full max-w-[800px] flex flex-col gap-8">
<!-- Title Input Section -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold text-slate-500 ml-1 uppercase tracking-widest">スレッドのタイトル</label>
<input class="w-full bg-[#1a1d24] border border-slate-800 rounded-xl px-4 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-600/50 text-white placeholder:text-slate-600 transition-all" placeholder="スレッドのタイトルを入力してください..." type="text"/>
</div>
<!-- Editor Section -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between px-1 mb-2">
<div class="flex gap-4">
<button class="text-slate-500 hover:text-blue-500 transition-colors" title="太字"><span class="material-symbols-outlined">format_bold</span></button>
<button class="text-slate-500 hover:text-blue-500 transition-colors" title="斜体"><span class="material-symbols-outlined">format_italic</span></button>
<button class="text-slate-500 hover:text-blue-500 transition-colors" title="リンク"><span class="material-symbols-outlined">link</span></button>
<button class="text-slate-500 hover:text-blue-500 transition-colors" title="コード"><span class="material-symbols-outlined">code</span></button>
<button class="text-slate-500 hover:text-blue-500 transition-colors" title="リスト"><span class="material-symbols-outlined">format_list_bulleted</span></button>
</div>
<div class="flex items-center gap-3">
<span class="text-[10px] font-bold text-slate-500 tracking-tighter">プレビュー表示</span>
<label class="relative flex h-5 w-9 cursor-pointer items-center rounded-full bg-slate-800 p-1 has-[:checked]:bg-blue-600">
<input class="sr-only peer" type="checkbox"/>
<div class="h-3 w-3 rounded-full bg-white shadow-sm transition-transform peer-checked:translate-x-4"></div>
</label>
</div>
</div>
<div class="relative bg-[#1a1d24] border border-slate-800 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-blue-600/50 transition-all">
<textarea class="w-full min-h-[400px] bg-transparent border-none p-6 text-base focus:ring-0 text-slate-200 placeholder:text-slate-600 resize-none leading-relaxed" placeholder="本文を入力してください... (Markdown形式が利用可能です。画像はURLを直接貼り付けてください)"></textarea>
</div>
<div class="flex items-center gap-2 px-1 text-[10px] text-slate-500 uppercase tracking-tight">
<span class="material-symbols-outlined text-sm">info</span>
<span>画像は外部サービスのURLを貼り付けると自動的に展開されます</span>
</div>
</div>
<!-- Info Box -->
<div class="p-6 rounded-xl border border-blue-500/10 bg-blue-500/5 flex items-start gap-4 mb-8">
<div class="p-2 bg-blue-600/20 rounded-lg text-blue-500 mt-1">
<span class="material-symbols-outlined">info</span>
</div>
<div class="flex flex-col gap-2">
<p class="text-white text-sm font-bold leading-tight">匿名投稿に関する注意事項</p>
<div class="text-slate-500 text-sm font-normal leading-relaxed space-y-1">
<p>・投稿は匿名で行われますが、サーバー側で自動的に識別用IDが生成されます。</p>
<p>・一度投稿した内容は、管理者に依頼しない限り削除・編集できない場合があります。</p>
<p>・氏名、電話番号、住所などの個人情報は絶対に入力しないでください。</p>
<p>・公序良俗に反する内容や、他者を誹謗中傷する投稿は制限の対象となります。</p>
</div>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Mobile Action -->
<div class="lg:hidden sticky bottom-0 left-0 right-0 p-4 bg-[#0f1115]/90 backdrop-blur-sm border-t border-slate-800">
<button class="w-full flex cursor-pointer items-center justify-center rounded-xl h-12 bg-blue-600 text-white text-base font-bold shadow-lg shadow-blue-600/20">
                    投稿する
                </button>
</div>
</div>
</div>
</body></html>
